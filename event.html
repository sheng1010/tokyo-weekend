<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-900">
  <div id="header"></div>

  <section class="max-w-5xl mx-auto px-4 py-12 space-y-6">
    <img id="event-image" class="w-full rounded-2xl shadow-sm" alt="event image">

    <div>
      <p id="event-category" class="mb-3 text-sm md:text-base font-semibold text-red-500"></p>

      <h1 id="event-title" class="mb-4 max-w-4xl text-4xl md:text-6xl font-bold leading-[1.05] text-gray-900"></h1>

      <p id="event-summary" class="max-w-3xl text-base md:text-xl leading-[1.65] text-gray-600"></p>
    </div>

    <div class="flex flex-wrap gap-x-8 gap-y-3 text-[14px] md:text-[15px] leading-6 text-gray-700">
      <div class="flex items-start gap-2.5">
        <svg class="mt-[3px] h-4 w-4 shrink-0 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 21s6-5.686 6-10a6 6 0 10-12 0c0 4.314 6 10 6 10z"/>
          <circle cx="12" cy="11" r="2.5"/>
        </svg>
        <span id="event-location"></span>
      </div>

      <div class="flex items-start gap-2.5">
        <svg class="mt-[3px] h-4 w-4 shrink-0 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
          <rect x="3" y="5" width="18" height="16" rx="2"/>
          <path stroke-linecap="round" d="M16 3v4M8 3v4M3 10h18"/>
        </svg>
        <span id="event-date"></span>
      </div>

      <div class="flex items-start gap-2.5">
        <svg class="mt-[3px] h-4 w-4 shrink-0 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
          <path stroke-linecap="round" stroke-linejoin="round" d="M7 17h10M8 3h8l1 5v8a2 2 0 01-2 2H9a2 2 0 01-2-2V8l1-5z"/>
          <path stroke-linecap="round" d="M9 21l-1 2M15 21l1 2"/>
        </svg>
        <span id="event-access"></span>
      </div>
    </div>

    <div class="space-y-6">
      <div class="rounded-3xl bg-white p-7 md:p-8 shadow-sm">
        <h2 class="mb-5 text-2xl md:text-3xl font-bold text-gray-900">Highlights</h2>
        <ul id="event-highlights" class="space-y-3"></ul>
      </div>

      <div class="rounded-3xl bg-white p-7 md:p-8 shadow-sm">
        <div class="grid grid-cols-1 md:grid-cols-[220px_1fr] gap-6 items-start">
          <div>
            <h2 class="mb-4 text-[20px] md:text-[22px] font-bold text-gray-900">Visitor rating</h2>

            <div class="flex items-end gap-3">
              <span id="event-rating-score" class="text-[44px] md:text-[48px] leading-none font-bold text-gray-900">4.7</span>
              <div class="pb-1">
                <p class="text-sm leading-none text-gray-500">out of 5</p>
                <p id="event-rating-count" class="mt-2 text-[13px] leading-snug text-gray-400">Based on 128 reviews</p>
              </div>
            </div>
          </div>

          <div class="rounded-2xl border border-gray-100 bg-gray-50 p-5 md:p-6">
            <p id="event-review-author" class="mb-3 text-[13px] text-gray-500">Aya, 29</p>
            <p id="event-review-text" class="text-[15px] leading-7 text-gray-800">
              Surprisingly intense in person. The scale feels much stranger than photos.
            </p>
          </div>
        </div>
      </div>

      <div class="rounded-3xl bg-white p-7 md:p-8 shadow-sm">
        <h2 class="mb-4 text-xl font-semibold text-gray-900">About this event</h2>
        <div id="event-description" class="text-gray-700 leading-8"></div>

        <a
          id="event-source-link"
          href="#"
          target="_blank"
          class="mt-5 inline-block font-medium text-red-500 hover:underline"
          style="display:none;"
        >
          Visit source →
        </a>
      </div>
    </div>
  </section>

  <script src="./Js/main.js"></script>
  <script>
    (async function () {
      await loadHeader();
    })();
  </script>
</body>
</html>
