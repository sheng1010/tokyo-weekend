<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Things to Do in Tokyo This Weekend (Updated Weekly)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./CSS/style.css" />
</head>
<body class="bg-gray-50 text-gray-900">

  <!-- Header -->
<div id="header"></div>

  <!-- Hero -->
  <section class="bg-white py-16">
    <div class="max-w-6xl mx-auto px-4 text-center">
      <h1 class="text-4xl md:text-5xl font-bold mb-4">
        What to Do in Tokyo This Weekend
      </h1>
      <p class="text-gray-600 mb-6 max-w-2xl mx-auto">
        Find film screenings, exhibitions, nightlife and useful event picks in Tokyo.
      </p>
      <input
        type="text"
        placeholder="Search events..."
        class="border rounded-lg px-4 py-3 w-full max-w-md"
      />
    </div>
  </section>

  <!-- Top Picks -->
<section class="max-w-6xl mx-auto py-12 px-4">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold">Top Picks This Weekend</h2>
    <a href="./pages/events.html" class="text-red-500 text-sm hover:underline">View all</a>
  </div>

  <div id="top-picks-container" class="grid grid-cols-4 gap-4 items-stretch"></div>
</section>

  <footer class="text-center text-gray-500 py-8 text-sm">
    Tokyo Weekend Guide © 2026
  </footer>

<script src="./Js/main.js"></script>
<script>
  (async function () {
    await loadHeader();
    await renderTopPicks();
  })();
</script>
</body>
</html>
